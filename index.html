<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz PPL</title>

<style>
* {
    box-sizing: border-box;
}

body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:15px;
}

.container{
    max-width:850px;
    margin:auto;
}

h1{
    text-align:center;
    font-size:1.8rem;
    word-break:break-word;
}

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

/* ===== TABS ===== */
.tabs {
    display:flex;
    gap:10px;
    margin-bottom:20px;
    flex-wrap:wrap;
}

.tab-btn {
    padding:12px 24px;
    border:none;
    border-radius:8px;
    font-size:1rem;
    cursor:pointer;
    background:#e9edf3;
    transition:0.3s;
}

.tab-btn:hover {
    background:#d8e0eb;
}

.tab-btn.active {
    background:#4CAF50;
    color:white;
}

/* ===== MENU RESPONSIVE ===== */
.menu{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-bottom:20px;
    align-items:center;
}

.menu select{
    flex:1 1 200px;
    min-width:150px;
    padding:12px;
    font-size:16px;
    border-radius:8px;
    border:1px solid #ccc;
    background:white;
}

.menu button{
    flex:0 0 auto;
    padding:12px 24px;
    font-size:16px;
    border-radius:8px;
    border:1px solid #ccc;
    background:#4CAF50;
    color:white;
    border:none;
    cursor:pointer;
    white-space:nowrap;
}

.menu button:hover{
    background:#43a047;
}

.topbar{
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
    font-weight:bold;
    flex-wrap:wrap;
    gap:5px;
}

.progress{
    height:18px;
    background:#ddd;
    border-radius:20px;
    overflow:hidden;
    margin-bottom:20px;
}

.progress-bar{
    height:100%;
    width:0%;
    background:#4CAF50;
    transition:0.3s;
}

.question{
    font-size:1.2rem;
    margin-bottom:20px;
    word-break:break-word;
    line-height:1.5;
}

/* ===== ANSWERS ===== */
.answer{
    width:100%;
    padding:12px 16px;
    margin-bottom:10px;
    border:none;
    border-radius:8px;
    text-align:left;
    background:#e9edf3;
    cursor:pointer;
    font-size:1rem;
    word-break:break-word;
    transition:0.2s;
}

.answer:hover{
    background:#d8e0eb;
}

.correct{
    background:#4CAF50!important;
    color:white;
}

.wrong{
    background:#e74c3c!important;
    color:white;
}

/* ===== EXPLANATION TEXT ===== */
.explanation-box{
    margin-top:15px;
    padding:15px 18px;
    border-radius:8px;
    background:#fff3cd;
    border-left:5px solid #ffc107;
    font-size:0.95rem;
    line-height:1.5;
    color:#333;
    display:none;
}

.explanation-box.show{
    display:block;
}

.explanation-box strong{
    color:#856404;
}

/* ===== REVISION CARDS ===== */
.revision-card {
    background:#f8f9fa;
    border-radius:10px;
    padding:18px 20px;
    margin-bottom:12px;
    border-left:4px solid #4CAF50;
    transition:0.3s;
    cursor:pointer;
}

.revision-card:hover {
    background:#eef1f5;
    transform:translateX(5px);
}

.revision-card h3 {
    margin:0 0 6px 0;
    font-size:1.1rem;
    color:#2c3e50;
}

.revision-card p {
    margin:0;
    color:#555;
    font-size:0.95rem;
    line-height:1.5;
}

.revision-card .tag {
    display:inline-block;
    background:#4CAF50;
    color:white;
    font-size:0.7rem;
    padding:2px 10px;
    border-radius:12px;
    margin-top:8px;
}

.cat-filter-btn {
    padding:8px 16px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    background:#e9edf3;
    transition:0.3s;
    font-size:0.85rem;
}

.cat-filter-btn:hover {
    background:#d8e0eb;
}

.cat-filter-btn.active {
    background:#4CAF50;
    color:white;
}

/* ===== RESPONSIVE SMALL SCREENS ===== */
@media (max-width: 500px){
    body{
        padding:10px;
    }

    .card{
        padding:15px;
    }

    h1{
        font-size:1.4rem;
    }

    .menu select{
        flex:1 1 100%;
        min-width:unset;
    }

    .menu button{
        flex:1 1 100%;
        width:100%;
        text-align:center;
        padding:14px;
        white-space:normal;
    }

    .question{
        font-size:1.1rem;
    }

    .answer{
        padding:14px 16px;
        font-size:0.95rem;
    }

    .topbar{
        font-size:0.9rem;
    }
}
</style>
</head>

<body>

<div class="container">

<h1>✈️ Quiz PPL</h1>

<!-- Boutons de navigation -->
<div class="tabs">
    <button class="tab-btn active" data-tab="quiz">📝 Quiz</button>
    <button class="tab-btn" data-tab="revision">📚 Fiches de révision</button>
</div>

<div class="card">

    <!-- SECTION QUIZ -->
    <div id="quizSection">
        <div class="menu">
            <select id="category"></select>
            <button id="startBtn">Commencer</button>
        </div>

        <div class="topbar">
            <div id="score">Score : 0</div>
        </div>

        <div class="progress">
            <div class="progress-bar" id="progress"></div>
        </div>

        <div id="question">Chargement...</div>
        <div id="answers"></div>

        <div class="explanation-box" id="explanationBox">
            <strong>✅ Bonne réponse :</strong> <span id="correctAnswerText"></span><br>
            <strong>📖 Explication :</strong> <span id="explanationText"></span>
        </div>
    </div>

    <!-- SECTION FICHES DE RÉVISION -->
    <div id="revisionSection" style="display:none;">
        <div style="display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap;" id="filterContainer">
            <button class="cat-filter-btn active" data-cat="all">Toutes</button>
        </div>
        <div id="revisionCards">
            <p style="text-align:center;color:#888;padding:40px 0;">Chargement des fiches...</p>
        </div>
    </div>

</div>
</div>

<script>
let questions = [];
let quiz = [];
let index = 0;
let score = 0;
let isAnswered = false;
let revisionData = {};

// ===== CHARGEMENT DES DONNÉES =====
Promise.all([
    fetch("./questions.json").then(r => r.json()),
    fetch("./revisions.json").then(r => r.json()).catch(() => {
        console.log("⚠️ revisions.json non trouvé");
        return {};
    })
])
.then(([questionsData, revisionsData]) => {
    console.log("✅ questions.json chargé :", questionsData.length, "questions");
    console.log("✅ revisions.json chargé :", Object.keys(revisionsData).length, "catégories");
    
    questions = questionsData;
    revisionData = revisionsData;
    
    setupCategories();
    setupRevisionFilters();
    renderRevisionCards('all');
})
.catch(err => {
    console.error("❌ Erreur:", err);
    document.getElementById("question").textContent = "Erreur chargement JSON";
});

// ===== ONGLETS =====
document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.onclick = function() {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        this.classList.add('active');

        const tab = this.dataset.tab;
        document.getElementById('quizSection').style.display = tab === 'quiz' ? 'block' : 'none';
        document.getElementById('revisionSection').style.display = tab === 'revision' ? 'block' : 'none';

        if (tab === 'revision') {
            renderRevisionCards(getActiveCategory());
        }
    };
});

// ===== SETUP CATEGORIES (Quiz) =====
function setupCategories(){
    const select = document.getElementById("category");
    select.innerHTML = "";

    const cats = [...new Set(questions.map(q => q.category))];

    const all = document.createElement("option");
    all.value = "all";
    all.textContent = "Toutes les catégories";
    select.appendChild(all);

    cats.forEach(cat => {
        const opt = document.createElement("option");
        opt.value = cat;
        opt.textContent = cat;
        select.appendChild(opt);
    });

    document.getElementById("startBtn").onclick = startQuiz;
}

// ===== SETUP FILTRES (Révision) =====
function setupRevisionFilters() {
    const container = document.getElementById('filterContainer');
    const cats = Object.keys(revisionData);
    
    console.log("📚 Catégories trouvées:", cats);

    container.innerHTML = '';
    const allBtn = document.createElement('button');
    allBtn.className = 'cat-filter-btn active';
    allBtn.dataset.cat = 'all';
    allBtn.textContent = 'Toutes';
    allBtn.onclick = function() { filterRevision('all', this); };
    container.appendChild(allBtn);

    cats.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'cat-filter-btn';
        btn.dataset.cat = cat;
        btn.textContent = cat;
        btn.onclick = function() { filterRevision(cat, this); };
        container.appendChild(btn);
    });
}

function filterRevision(cat, activeBtn) {
    document.querySelectorAll('.cat-filter-btn').forEach(b => b.classList.remove('active'));
    if (activeBtn) activeBtn.classList.add('active');
    renderRevisionCards(cat);
}

function getActiveCategory() {
    const active = document.querySelector('.cat-filter-btn.active');
    return active ? active.dataset.cat : 'all';
}

// ===== AFFICHER LES FICHES =====
function renderRevisionCards(category) {
    const container = document.getElementById('revisionCards');
    container.innerHTML = '';

    let cards = [];
    
    if (category === 'all') {
        Object.keys(revisionData).forEach(cat => {
            if (Array.isArray(revisionData[cat])) {
                revisionData[cat].forEach(item => {
                    cards.push({ ...item, category: cat });
                });
            }
        });
    } else {
        if (revisionData[category] && Array.isArray(revisionData[category])) {
            cards = revisionData[category].map(item => ({ ...item, category }));
        }
    }

    if (cards.length === 0) {
        container.innerHTML = '<p style="text-align:center;color:#888;padding:40px 0;">Aucune fiche de révision pour cette catégorie.</p>';
        return;
    }

    cards.forEach(card => {
        const div = document.createElement('div');
        div.className = 'revision-card';
        div.innerHTML = `
            <h3>📌 ${card.titre}</h3>
            <p>${card.contenu}</p>
            <span class="tag">${card.category}</span>
        `;
        container.appendChild(div);
    });
}

// ===== QUIZ =====
function startQuiz(){
    const cat = document.getElementById("category").value;

    quiz = (cat === "all")
        ? [...questions]
        : questions.filter(q => q.category === cat);

    quiz = quiz.sort(() => Math.random() - 0.5);

    index = 0;
    score = 0;

    showQuestion();
}

function showQuestion(){
    const explanationBox = document.getElementById("explanationBox");
    explanationBox.classList.remove("show");
    isAnswered = false;

    if(index >= quiz.length){
        document.getElementById("question").innerHTML =
            `🎉 Terminé ! Score : ${score}/${quiz.length}`;
        document.getElementById("answers").innerHTML = "";
        return;
    }

    const q = quiz[index];
    document.getElementById("question").textContent = q.question;

    const answersDiv = document.getElementById("answers");
    answersDiv.innerHTML = "";

    q.answers.forEach((a, i) => {
        const btn = document.createElement("button");
        btn.className = "answer";
        btn.textContent = a;
        btn.dataset.index = i;

        btn.onclick = () => {
            if (isAnswered) return;
            isAnswered = true;

            const isCorrect = (i === q.correct);
            const allBtns = answersDiv.querySelectorAll(".answer");
            allBtns.forEach((b, idx) => {
                b.disabled = true;
                if (idx === q.correct) {
                    b.classList.add("correct");
                } else if (idx === i && !isCorrect) {
                    b.classList.add("wrong");
                }
            });

            if (isCorrect) {
                score++;
            }

            showExplanation(q, i);
            updateUI();

            setTimeout(() => {
                index++;
                showQuestion();
            }, 10000);
        };

        answersDiv.appendChild(btn);
    });

    updateUI();
}

function showExplanation(q, selectedIndex){
    const explanationBox = document.getElementById("explanationBox");
    const correctAnswerText = document.getElementById("correctAnswerText");
    const explanationText = document.getElementById("explanationText");

    const correctAnswer = q.answers[q.correct];
    const isCorrect = (selectedIndex === q.correct);

    if (isCorrect) {
        explanationBox.style.borderLeftColor = "#28a745";
        explanationBox.style.background = "#d4edda";
    } else {
        explanationBox.style.borderLeftColor = "#ffc107";
        explanationBox.style.background = "#fff3cd";
    }

    correctAnswerText.textContent = correctAnswer;
    explanationText.textContent = q.explanation;
    explanationBox.classList.add("show");
}

function updateUI(){
    document.getElementById("score").textContent =
        `Score : ${score}/${quiz.length}`;

    document.getElementById("progress").style.width =
        (index / quiz.length) * 100 + "%";
}
</script>

</body>
</html>
